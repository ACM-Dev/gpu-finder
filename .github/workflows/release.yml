name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          export GOOS=${{ matrix.os }}
          export GOARCH=${{ matrix.arch }}
          export CGO_ENABLED=0
          BIN_NAME="gpu-finder"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BIN_NAME="gpu-finder.exe"
          fi
          go build -ldflags="-s -w" -o ${BIN_NAME} .

      - name: Package
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            tar czf gpu-finder-${{ matrix.os }}-${{ matrix.arch }}.tar.gz gpu-finder.exe
          else
            tar czf gpu-finder-${{ matrix.os }}-${{ matrix.arch }}.tar.gz gpu-finder
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-finder-${{ matrix.os }}-${{ matrix.arch }}
          path: gpu-finder-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
